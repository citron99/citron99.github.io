<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dmitry AI Portfolio</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{

      font-family:'Inter',sans-serif;

      background:
        linear-gradient(135deg,#f5f7ff,#eef4ff);

      color:#0f172a;

      overflow-x:hidden;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:0 auto;
    }

    /* BACKGROUND */

    .bg-blur{

      position:fixed;

      width:450px;
      height:450px;

      border-radius:50%;

      filter:blur(140px);

      opacity:0.28;

      z-index:-1;
    }

    .blur1{
      background:#60a5fa;
      top:-100px;
      left:-100px;
    }

    .blur2{
      background:#c084fc;
      bottom:-100px;
      right:-100px;
    }

    /* NAVBAR */

    .navbar{

      position:fixed;

      top:0;
      width:100%;

      padding:22px 7%;

      display:flex;
      justify-content:space-between;
      align-items:center;

      background:
        rgba(255,255,255,0.6);

      backdrop-filter:blur(18px);

      border-bottom:
        1px solid rgba(255,255,255,0.3);

      box-shadow:
        0 0 40px rgba(96,165,250,0.08);

      z-index:1000;
    }

    .logo{

      font-size:28px;

      font-weight:800;

      color:#2563eb;
    }

    .nav-links{

      display:flex;

      gap:32px;

      list-style:none;
    }

    .nav-links a{

      color:#0f172a;

      text-decoration:none;

      font-weight:600;

      transition:0.3s;
    }

    .nav-links a:hover{
      color:#2563eb;
    }

    /* HERO */

    header{

      min-height:100vh;

      display:flex;
      align-items:center;

      padding:
        180px 0 120px;
    }

    .hero-grid{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(320px,1fr));

      gap:70px;

      align-items:center;
    }

    .hero-badge{

      display:inline-block;

      padding:10px 18px;

      border-radius:999px;

      background:
        rgba(37,99,235,0.08);

      border:
        1px solid rgba(37,99,235,0.1);

      color:#2563eb;

      font-weight:600;
    }

    .hero-left h1{

      font-size:64px;

      line-height:1.1;

      margin:28px 0;

      color:#0f172a;
    }

    .hero-left p{

      font-size:22px;

      line-height:1.8;

      color:#475569;

      margin-bottom:36px;
    }

    .hero-buttons{

      display:flex;

      gap:18px;

      flex-wrap:wrap;
    }

    .btn{

      display:inline-block;

      padding:16px 30px;

      border-radius:16px;

      text-decoration:none;

      font-weight:700;

      transition:0.3s;
    }

    .btn-primary{

      background:
        linear-gradient(135deg,#2563eb,#7c3aed);

      color:white;

      box-shadow:
        0 10px 30px rgba(37,99,235,0.2);
    }

    .btn-secondary{

      border:
        1px solid rgba(37,99,235,0.15);

      color:#2563eb;

      background:white;
    }

    .btn:hover{
      transform:translateY(-4px);
    }

    /* HERO WINDOW */

    .hero-right{

      display:flex;
      justify-content:center;
    }

    .ai-window{

      width:100%;
      max-width:520px;

      background:
        rgba(255,255,255,0.7);

      border:
        1px solid rgba(255,255,255,0.5);

      backdrop-filter:blur(18px);

      border-radius:30px;

      padding:30px;

      box-shadow:
        0 25px 80px rgba(0,0,0,0.08);

      animation:
        float 5s ease-in-out infinite;
    }

    .window-top{

      display:flex;

      gap:10px;

      margin-bottom:30px;
    }

    .window-top span{

      width:14px;
      height:14px;

      border-radius:50%;

      background:#cbd5e1;
    }

    .code-line{

      height:14px;

      border-radius:999px;

      background:
        rgba(148,163,184,0.2);

      margin-bottom:16px;
    }

    .w90{width:90%;}
    .w80{width:80%;}
    .w70{width:70%;}
    .w60{width:60%;}
    .w50{width:50%;}

    .ai-card{

      margin:30px 0;

      padding:26px;

      border-radius:22px;

      background:
        linear-gradient(135deg,#2563eb,#7c3aed);

      text-align:center;

      font-size:24px;

      font-weight:700;

      color:white;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-12px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* STATS */

    .stats{

      margin-top:50px;

      display:flex;

      gap:22px;

      flex-wrap:wrap;
    }

    .stat-card-mini{

      padding:24px;

      min-width:180px;

      border-radius:24px;

      background:white;

      border:
        1px solid rgba(255,255,255,0.5);

      box-shadow:
        0 10px 30px rgba(0,0,0,0.05);
    }

    .stat-card-mini h3{

      font-size:42px;

      margin-bottom:10px;

      color:#2563eb;
    }

    .stat-card-mini p{

      color:#475569;
    }

    /* SECTION */

    section{
      padding:120px 0;
    }

    h2{

      text-align:center;

      font-size:52px;

      margin-bottom:70px;

      color:#0f172a;
    }

    /* ABOUT */

    .about-grid{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(280px,1fr));

      gap:30px;
    }

    .about-card{

      background:white;

      padding:40px;

      border-radius:28px;

      box-shadow:
        0 15px 40px rgba(0,0,0,0.05);

      transition:0.35s;
    }

    .about-card:hover{

      transform:
        translateY(-10px);

      box-shadow:
        0 0 40px rgba(96,165,250,0.15);
    }

    .about-card h3{

      font-size:28px;

      margin-bottom:18px;

      color:#2563eb;
    }

    .about-card p{

      color:#475569;

      line-height:1.8;
    }

    /* STACK */

    .stack-grid{

      display:flex;

      flex-wrap:wrap;

      justify-content:center;

      gap:18px;
    }

    .stack-item{

      padding:16px 24px;

      border-radius:18px;

      background:white;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.05);

      transition:0.3s;

      font-weight:600;

      color:#2563eb;
    }

    .stack-item:hover{

      transform:
        translateY(-5px)
        scale(1.05);
    }

    /* PORTFOLIO */

    #portfolio{

      background:
        linear-gradient(135deg,#eef4ff,#f5f3ff);
    }

    .projects-grid{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(340px,1fr));

      gap:34px;
    }

    .project-card{

      background:white;

      border-radius:30px;

      overflow:hidden;

      box-shadow:
        0 18px 45px rgba(0,0,0,0.06);

      transition:0.35s;
    }

    .project-card:hover{

      transform:
        translateY(-12px)
        scale(1.02);

      box-shadow:
        0 0 40px rgba(96,165,250,0.15);
    }

    .project-image{

      height:220px;

      overflow:hidden;
    }

    .project-image img{

      width:100%;
      height:100%;

      object-fit:cover;

      transition:0.5s;
    }

    .project-card:hover .project-image img{

      transform:scale(1.08);
    }

    .project-content{
      padding:32px;
    }

    .project-content h3{

      font-size:30px;

      margin-bottom:14px;

      color:#0f172a;
    }

    .project-content p{

      color:#475569;

      line-height:1.8;

      margin-bottom:24px;
    }

    .tags{

      display:flex;

      flex-wrap:wrap;

      gap:10px;

      margin-bottom:24px;
    }

    .tags span{

      background:
        #dbeafe;

      color:#2563eb;

      padding:8px 14px;

      border-radius:999px;

      font-size:14px;

      font-weight:600;
    }

    .project-buttons{

      display:flex;

      gap:14px;
    }

    .project-buttons a{

      text-decoration:none;

      padding:12px 20px;

      border-radius:14px;

      background:
        linear-gradient(135deg,#2563eb,#7c3aed);

      color:white;

      font-weight:700;
    }

    /* GITHUB STATS */

    .github-stats{

      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(240px,1fr));

      gap:24px;
    }

    .stat-card{

      background:white;

      padding:40px;

      border-radius:28px;

      text-align:center;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.05);

      transition:0.3s;
    }

    .stat-card:hover{

      transform:
        translateY(-8px);
    }

    .stat-card h3{

      font-size:42px;

      margin-bottom:12px;

      color:#2563eb;
    }

    .stat-card p{

      color:#475569;
    }

    /* CONTACT */

    .contact-box{

      background:white;

      padding:70px;

      border-radius:36px;

      text-align:center;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.05);
    }

    .contact-box p{

      max-width:700px;

      margin:0 auto 36px;

      color:#475569;

      line-height:1.8;
    }

    form{

      max-width:620px;

      margin:0 auto;
    }

    input,
    textarea{

      width:100%;

      padding:18px;

      margin-bottom:18px;

      border:none;

      border-radius:14px;

      background:
        #f8fafc;

      color:#0f172a;

      font-size:16px;
    }

    textarea{
      height:160px;
      resize:none;
    }

    button{

      padding:16px 36px;

      border:none;

      border-radius:14px;

      background:
        linear-gradient(135deg,#2563eb,#7c3aed);

      color:white;

      font-size:17px;

      font-weight:700;

      cursor:pointer;
    }

    /* FOOTER */

    footer{

      padding:70px 0;

      text-align:center;
    }

    footer h3{

      font-size:30px;

      margin-bottom:12px;

      color:#2563eb;
    }

    footer p{

      color:#64748b;

      margin-bottom:24px;
    }

    .footer-links{

      display:flex;

      justify-content:center;

      gap:22px;
    }

    .footer-links a{

      text-decoration:none;

      color:#2563eb;

      font-weight:600;
    }

    /* TELEGRAM */

    .telegram-float{

      position:fixed;

      right:30px;
      bottom:30px;

      width:72px;
      height:72px;

      border-radius:50%;

      display:flex;

      align-items:center;
      justify-content:center;

      text-decoration:none;

      font-size:32px;

      background:
        linear-gradient(135deg,#2563eb,#7c3aed);

      color:white;

      box-shadow:
        0 12px 30px rgba(37,99,235,0.2);

      z-index:999;

      animation:pulse 2s infinite;
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.08);
      }

      100%{
        transform:scale(1);
      }
    }

    /* MOBILE */

    @media(max-width:768px){

      .nav-links{
        display:none;
      }

      .hero-left h1{
        font-size:48px;
      }

      .hero-left p{
        font-size:18px;
      }

      h2{
        font-size:38px;
      }

      .contact-box{
        padding:40px 24px;
      }
    }

  </style>

</head>

<body>

  <div class="bg-blur blur1"></div>
  <div class="bg-blur blur2"></div>

</body>

</html>
