<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>RAG AI Assistant</title>

  <style>

    body {

      margin: 0;

      font-family: Arial, sans-serif;

      background:
        linear-gradient(135deg,#eef6ff,#f8fbff);

      color: #0f172a;
    }

    .container {

      width: 90%;

      max-width: 1100px;

      margin: 60px auto;
    }

    .back {

      display: inline-block;

      margin-bottom: 30px;

      text-decoration: none;

      color: #2563eb;

      font-weight: bold;
    }

    .hero {

      background: white;

      padding: 40px;

      border-radius: 24px;

      box-shadow:
        0 15px 40px rgba(0,0,0,0.08);

      margin-bottom: 40px;
    }

    .hero h1 {

      font-size: 48px;

      margin-bottom: 20px;
    }

    .hero p {

      font-size: 18px;

      line-height: 1.7;

      color: #475569;
    }

    .tags {

      display: flex;

      gap: 10px;

      margin-top: 25px;

      flex-wrap: wrap;
    }

    .tags span {

      background: #dbeafe;

      color: #2563eb;

      padding: 8px 14px;

      border-radius: 999px;

      font-weight: 600;
    }

    .buttons {

      margin-top: 30px;

      display: flex;

      gap: 16px;
    }

    .buttons a {

      text-decoration: none;

      padding: 14px 24px;

      border-radius: 12px;

      background:
        linear-gradient(135deg,#2563eb,#7c3aed);

      color: white;

      font-weight: 600;
    }

    iframe {

      width: 100%;

      height: 1000px;

      border: none;

      border-radius: 24px;

      background: white;

      box-shadow:
        0 15px 40px rgba(0,0,0,0.08);
    }

  </style>

</head>

<body>

  <div class="container">

    <a href="index.html" class="back">
      ← Назад
    </a>

    <div class="hero">

      <h1>RAG AI Assistant</h1>

      <p>

        AI-ассистент для поиска информации
        по базе знаний компании
        с использованием RAG,
        LangChain и OpenAI.

      </p>

      <div class="tags">

        <span>Python</span>
        <span>LangChain</span>
        <span>OpenAI</span>
        <span>RAG</span>

      </div>

      <div class="buttons">

        <a
          href="https://github.com/citron99/rag-assistant-final"
          target="_blank"
        >
          GitHub
        </a>

      </div>

    </div>

    <!-- README -->

    <iframe
      src="https://github.com/citron99/rag-assistant-final/blob/main/README.md"
    ></iframe>

  </div>

</body>

</html>
